{% extends "layout.html" %}
{% block title %}Início{% endblock %}
{% block content %}
    <h2>Adicionar nova tarefa</h2>
    <form action="/" method="POST">
        <label for="titulo">Título: </label>
        <input type="text" name="titulo" placeholder = "Título da tarefa" required id="titulo">
        <button type="submit" >Adicionar</button>
    </form>
    <!-- Mostrar lista de tarefas -->
     <h2>Lista de tarefas:</h2>
     <ul>
        {% for i in tarefas %}
            <li>
                {{ i }}
            </li>
            <a href="/remove/indice = loop.index0">Remover</a> <!--Ainda vou criar a rota disso, calma. -->
        {% endfor %}
     </ul>
{% endblock %}
